# ========================================
# OpenMAIC Backend 配置文件
#
# 说明：
# 1. 本文件为基础配置，所有环境通用
# 2. 敏感信息（如 API Key、密码）请在 application-local.yml 中配置
# 3. 生产环境配置请在 application-prod.yml 中覆盖
# 4. 开发环境配置请在 application-remote.yml 中覆盖
# ========================================

spring:
    # ========================================
    # 应用基础配置
    # ========================================
    application:
        # 应用名称，用于日志、监控等标识
        name: ql-ai-classroom

    profiles:
        # 激活的配置文件（dev/prod）
        # dev: 开发环境，启用详细日志和调试功能
        # prod: 生产环境，优化性能和安全性
        active: dev

    # ========================================
    # 数据库配置
    # ========================================
    datasource:
        # 数据库驱动类（MariaDB/MySQL 通用驱动）
        driver-class-name: org.mariadb.jdbc.Driver

        # 数据库连接 URL
        # 参数说明：
        # - useUnicode=true: 使用 Unicode 字符集
        # - characterEncoding=utf8mb4: 字符编码（支持 emoji）
        # - serverTimezone=Asia/Shanghai: 服务器时区
        url:

        # 数据库用户名
        username:

        # 数据库密码
        password:

        # HikariCP 连接池配置（性能优化）
        hikari:
            # 连接池最大连接数
            # 推荐值：CPU 核心数 * 2 + 有效磁盘数
            maximum-pool-size: 10

            # 连接池最小空闲连接数
            # 推荐至少保持 5 个连接以应对突发请求
            minimum-idle: 5

            # 连接超时时间（毫秒）
            # 超过此时间无法获取连接则抛出异常
            connection-timeout: 30000

            # 连接空闲超时时间（毫秒）
            # 超过此时间的空闲连接会被释放（仅当连接数大于 minimum-idle 时）
            idle-timeout: 600000

            # 连接最大存活时间（毫秒）
            # 超过此时间的连接会被强制关闭并重新创建（防止数据库端超时）
            max-lifetime: 1800000

    # ========================================
    # JPA / Hibernate 配置
    # ========================================
    jpa:
        # 数据库方言（用于生成特定数据库的 SQL）
        database-platform: org.hibernate.dialect.MariaDBDialect

        # 是否在日志中打印 SQL 语句
        show-sql: false

        # 是否启用 Open Session In View 模式
        # false: 避免懒加载问题和性能隐患（推荐）
        open-in-view: false

        hibernate:
            # DDL 自动生成策略
            # validate: 启动时验证表结构是否匹配（生产环境推荐）
            # update: 自动更新表结构（仅开发环境使用）
            # create: 每次启动删除并重建表（仅测试使用）
            # create-drop: 启动时创建，关闭时删除（仅测试使用）
            # none: 不执行任何操作
            ddl-auto: validate

            # 命名策略
            naming:
                # 物理命名策略：保持数据库字段名与实体字段名一致
                # 使用 PhysicalNamingStrategyStandardImpl 不做驼峰转下划线
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

        properties:
            hibernate:
                # 是否格式化 SQL（便于阅读）
                format_sql: false

                # 是否在 SQL 中添加注释
                use_sql_comments: false

    # ========================================
    # Flyway 数据库迁移配置
    # ========================================
    flyway:
        # 是否启用 Flyway 数据库版本管理
        enabled: true

        # 迁移脚本存放位置
        # 默认在 src/main/resources/db/migration/
        locations: classpath:db/migration

        # 是否在迁移时创建 baseline
        # true: 允许在已有数据的数据库上执行迁移
        baseline-on-migrate: true

        # 是否验证迁移脚本
        # true: 启动时验证已执行的迁移脚本未被修改
        validate-on-migrate: true

    # ========================================
    # 文件上传配置
    # ========================================
    servlet:
        multipart:
            # 单个文件最大大小
            max-file-size: 50MB

            # 整个请求最大大小（包含所有文件和表单数据）
            max-request-size: 100MB

# ========================================
# 服务器配置
# ========================================
server:
    # HTTP 服务器端口
    port: 8080

    servlet:
        # 应用上下文路径（根路径）
        context-path: /api/v1/


# ========================================
# 认证配置（混合方案）
# ========================================

# 阶段 1：访问码认证（与现有前端兼容）
access:
    # 访问码（可选）
    # 说明：
    # - 如果不设置（空字符串），系统完全开放访问
    # - 如果设置了访问码，用户必须输入正确的访问码才能使用系统
    # - 访问码验证通过后，会在 Cookie 中设置 HMAC 签名的 Token
    # - Token 有效期 7 天
    # 使用场景：
    # - 个人部署：不设置，完全开放
    # - 团队共享：设置一个密码，所有人共享
    code: ""

# 阶段 2：JWT Token 认证（可选用户系统）
jwt:
    # JWT 签名密钥
    # 重要：生产环境必须修改为强随机密钥！
    # 推荐使用 64 位以上的随机字符串
    secret: "ql-ai-classroom-jwt-secret-change-me-in-production-please"

    # JWT Token 有效期（秒）
    # 86400 秒 = 24 小时
    expiration: 86400

    # Refresh Token 有效期（秒）
    # 604800 秒 = 7 天
    # 用于刷新过期的 Access Token
    refresh-expiration: 604800

# 用户账号配置
account:
    # 是否允许用户注册
    # true: 允许新用户注册
    # false: 仅管理员可创建账号
    registration-enabled: true

    # 是否需要邮箱验证
    # true: 注册后需要验证邮箱
    # false: 注册后直接激活
    email-verification: false

    # 默认昵称前缀
    # 用户未设置昵称时使用此前缀 + 数字
    default-nickname: "Student"

