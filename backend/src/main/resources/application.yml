# ========================================
# 异步任务配置
# ========================================

async:
    # 核心线程池大小
    # 即使空闲也保持的线程数
    core-pool-size: 5

    # 最大线程池大小
    # 允许创建的最大线程数
    max-pool-size: 10

    # 任务队列容量
    # 当所有核心线程都繁忙时，任务会放入队列等待
    # 队列满后才会创建新线程（直到达到 max-pool-size）
    queue-capacity: 100

    # 线程名称前缀
    # 用于日志追踪和调试
    thread-name-prefix: "async-task-"

# ========================================
# CORS 跨域配置
# ========================================

cors:
    # 允许的源（域名）
    allowed-origins:


# ========================================
# 日志配置
# ========================================

logging:
    # 日志级别配置
    level:
        # 根日志级别（全局默认）
        root: INFO

        # 应用包日志级别
        # DEBUG: 开发环境查看详细日志
        # INFO: 生产环境减少日志量
        cc.qianlang.aiclassroom: DEBUG

        # Spring Web 日志级别
        org.springframework.web: INFO

        # Spring Security 日志级别
        org.springframework.security: INFO

        # Hibernate SQL 日志级别
        # DEBUG: 打印 SQL 语句
        # INFO: 不打印 SQL
        org.hibernate.SQL: DEBUG

        # Hibernate 参数绑定日志
        # TRACE: 打印 SQL 参数值（调试时有用）
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE

    # 日志输出格式
    pattern:
        # 控制台输出格式
        # %d: 日期时间
        # %thread: 线程名
        # %-5level: 日志级别（左对齐，5个字符宽度）
        # %logger{36}: 日志记录器名称（最多36个字符）
        # %msg: 日志消息
        # %n: 换行符
        console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

        # 文件输出格式（与控制台相同）
        file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

    # 日志文件配置
    file:
        # 日志文件路径
        # 自动创建日志目录
        name: "./logs/app.log"

        # 单个日志文件最大大小
        # 超过此大小会自动滚动（创建新文件）
        max-size: "10MB"

        # 日志文件保留天数
        # 超过此天数的旧日志会被自动删除
        max-history: 30

# ========================================
# SpringDoc OpenAPI 配置（Swagger UI）
# ========================================

springdoc:
    # API 文档配置
    api-docs:
        # 是否启用 API 文档
        enabled: true

        # API 文档访问路径
        path: /api-doc/v1

    # Swagger UI 配置
    swagger-ui:
        # 是否启用 Swagger UI
        enabled: true

        # Swagger UI 访问路径
        # 访问地址：http://localhost:8080/swagger-ui.html
        path: /swagger-ui.html

        # 标签排序方式（alpha: 按字母顺序）
        tags-sorter: alpha

        # 接口操作排序方式（alpha: 按字母顺序）
        operations-sorter: alpha

    # 默认响应媒体类型
    default-produces-media-type: application/json

    # 默认请求媒体类型
    default-consumes-media-type: application/json

# ========================================
# Spring Boot Actuator 配置（健康检查）
# ========================================

management:
    # 端点配置
    endpoints:
        web:
            exposure:
                # 暴露的端点
                # health: 健康检查端点（/actuator/health）
                # info: 应用信息端点（/actuator/info）
                # 生产环境仅暴露必要端点
                include:
                    - health
                    - info

    # 具体端点配置
    endpoint:
        health:
            # 健康检查详情显示策略
            # when-authorized: 仅授权用户可查看详情
            # always: 总是显示详情
            # never: 从不显示详情
            # 生产环境建议设为 never
            show-details: always


tenant-secret-key: sk_ai-classroom

foundation:
    risk-control:
        enable: false
        task:
            RiskActionRecordCleanupTask:
                enable: false
                cron: 0 * * * * *
    file-storage:
        storage:
            root-path:
            dir-path-pattern: "{date}_{HH}"
            filename-pattern: "{date_ymd}_{HH}{mm}{ss}_{id}_{random_string}"
        uri:
            prefix:
        task:
            StorageFileAutoCleanTask:
                enable: true
                cron: 0 * * * * *